server:
  port: 8081
spring:
  application:
    name: traffic-light-controller
  datasource:
    url: jdbc:h2:mem:trafficdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info